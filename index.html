<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아몬대출중계사</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: 'Apple SD Gothic Neo', sans-serif;
  background:#f3f6fb;
}

.wrap{
  max-width:480px;
  margin:auto;
}

/* 상단 배너 */
.hero{
  background:linear-gradient(135deg,#2d8cff,#1b5ed7);
  color:#fff;
  padding:40px 20px;
  text-align:center;
}

.hero h1{
  font-size:22px;
  margin-bottom:10px;
}

.hero p{
  font-size:14px;
}

/* 포인트 */
.features{
  display:flex;
  justify-content:space-between;
  background:#fff;
  margin-top:-20px;
  border-radius:15px;
  padding:15px;
}

.feature{
  text-align:center;
  font-size:12px;
}

/* 폼 */
.form-box{
  background:#fff;
  margin:15px;
  padding:20px;
  border-radius:15px;
}

.input{
  width:100%;
  padding:13px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:10px;
}

.submit-btn{
  width:100%;
  padding:15px;
  background:#2d8cff;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* 실시간 */
.live{
  background:#fff;
  margin:15px;
  padding:20px;
  border-radius:15px;
}

.live-item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  font-size:13px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
  <h1>아몬대출중계사</h1>
  <p>무서류 · 당일승인 · 신용무관</p>
</div>

<div class="features">
  <div class="feature">무서류</div>
  <div class="feature">당일승인</div>
  <div class="feature">신용무관</div>
</div>

<div class="form-box">
  <input class="input" placeholder="이름">
  <input class="input" placeholder="전화번호">
  <button class="submit-btn">상담 신청하기</button>
</div>

<div class="live">
  <div id="list"></div>
</div>

</div>

<script>
const names=["김**","이**","박**","최**"];
function addItem(){
  const div=document.createElement("div");
  div.className="live-item";
  div.innerText=names[Math.floor(Math.random()*names.length)]+" 신청완료";
  document.getElementById("list").prepend(div);
}
setInterval(addItem,2000);
</script>

</body>
</html>
