<script>
// 슬라이드
let current=0;
const slides=document.getElementById("slides");
const dots=document.querySelectorAll(".dot");

setInterval(()=>{
  current=(current+1)%3;
  slides.style.transform=`translateX(-${current*100}%)`;
  dots.forEach(d=>d.classList.remove("active"));
  dots[current].classList.add("active");
},3000);


// 🔥 텔레그램 전송 (개선버전)
function sendTelegram(){

  const name = document.getElementById("name").value;
  const birth = document.getElementById("birth").value;
  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;

  if(!name || !phone){
    alert("이름과 전화번호는 필수입니다.");
    return;
  }

  const msg = `📌 상담 신청 접수\n이름: ${name}\n생년월일: ${birth}\n전화번호: ${phone}\n금액: ${amount}`;

  const token = "8751871813:AAEf7TRWrujPJSSjhHF63M-jE-Vy033L_8o";
  const chat_id = "8219424665";

  fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`)
  .then(()=>{
    alert("신청 완료! 곧 연락드립니다.");

    // 입력 초기화
    document.getElementById("name").value="";
    document.getElementById("birth").value="";
    document.getElementById("phone").value="";
  })
  .catch(()=>{
    alert("전송 실패");
  });
}
</script>
