<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간편 대출 상담</title>

<style>
*{margin:0; padding:0; box-sizing:border-box;}
body{font-family:sans-serif; background:#f6f7fb; color:#222;}

.container{max-width:480px; margin:auto;}

/* 상단 */
.hero{
  background:linear-gradient(135deg,#2d8cff,#6ea8ff);
  color:#fff; text-align:center; padding:40px 20px;
}
.hero h1{font-size:22px; margin-bottom:10px;}
.hero p{font-size:14px; opacity:0.9;}

.btn{
  display:block; margin-top:15px; padding:14px;
  border-radius:10px; text-decoration:none; font-weight:bold;
}
.kakao{background:#ffcc00; color:#000;}
.apply{background:#fff; color:#2d8cff;}

/* 카드 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-size:13px;
}

/* 실시간 */
.live{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:12px;
}
.live-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#fafafa;
  border-radius:8px;
  margin-top:8px;
}
.badge{padding:4px 8px; border-radius:6px; color:#fff; font-size:11px;}
.wait{background:#f0ad4e;}
.done{background:#5bc0de;}
.ok{background:#5cb85c;}

/* 후기 */
.review{
  padding:15px;
}
.review .box{
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:13px;
}

/* 하단 */
.footer{
  padding:20px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 상단 -->
<div class="hero">
  <h1>무직자 / 저신용자 상담 가능</h1>
  <p>조건에 따라 빠른 안내 도와드립니다</p>

  <a href="https://open.kakao.com/o/너링크" class="btn kakao">무료 상담하기</a>
  <a href="https://creatorlink.net/너링크" class="btn apply">빠른 신청</a>
</div>

<!-- 🔥 특징 -->
<div class="grid">
  <div class="card">선입금 없음</div>
  <div class="card">간편 진행</div>
  <div class="card">빠른 처리</div>
  <div class="card">상담 지원</div>
</div>

<!-- 🔥 실시간 -->
<div class="live">
  <b>최근 신청 현황</b>
  <div id="list"></div>
</div>

<!-- 🔥 중간 버튼 -->
<div class="footer">
  <a href="https://open.kakao.com/o/너링크" class="btn kakao">지금 상담하기</a>
</div>

<!-- 🔥 후기 -->
<div class="review">
  <div class="box">“빠르게 상담받고 진행됐어요”</div>
  <div class="box">“친절하게 설명해줘서 좋았습니다”</div>
  <div class="box">“생각보다 간단했어요”</div>
</div>

<!-- 🔥 하단 버튼 -->
<div class="footer">
  <a href="https://open.kakao.com/o/너링크" class="btn kakao">무료 상담 받기</a>
</div>

</div>

<script>
const names=["김**","이**","박**","최**","정**"];
const amounts=["100만원","150만원","200만원","300만원"];
const status=[
{text:"상담대기",class:"wait"},
{text:"신청완료",class:"done"},
{text:"승인완료",class:"ok"}
];

function addItem(){
const name=names[Math.floor(Math.random()*names.length)];
const amount=amounts[Math.floor(Math.random()*amounts.length)];
const stat=status[Math.floor(Math.random()*status.length)];

const div=document.createElement("div");
div.className="live-item";
div.innerHTML=`
<div>${name} / ${amount}</div>
<div class="badge ${stat.class}">${stat.text}</div>
`;

const list=document.getElementById("list");
list.prepend(div);

if(list.children.length>6){
list.removeChild(list.lastChild);
}
}

for(let i=0;i<3;i++) addItem();
setInterval(addItem,3000);
</script>

</body>
</html>
