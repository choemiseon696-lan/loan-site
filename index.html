<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아몬대출중계사</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Apple SD Gothic Neo',sans-serif;
  background:#0f4bbd;
}

/* 전체 */
.wrap{
  max-width:480px;
  margin:auto;
  background:#0f4bbd;
}

/* 🔥 이미지 영역 */
.hero{
  position:relative;
}

.hero img{
  width:100%;
  display:block;
}

/* 🔥 이미지 위 폼 */
.form-overlay{
  position:absolute;
  top:38%;
  left:8%;
  width:84%;
}

.input{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

.select{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}

.submit{
  width:100%;
  padding:15px;
  background:#2d8cff;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}

/* 🔥 실시간 */
.live{
  background:#fff;
  margin:15px;
  border-radius:15px;
  padding:15px;
}

.live-title{
  font-weight:bold;
  margin-bottom:10px;
}

.live-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:13px;
}

.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
}

.wait{background:#e3f2fd;color:#1976d2;}
.done{background:#e8f5e9;color:#2e7d32;}
.ok{background:#fff3e0;color:#ef6c00;}

/* 🔥 하단 버튼 */
.kakao{
  background:#ffeb00;
  padding:18px;
  text-align:center;
  font-weight:bold;
  margin:15px;
  border-radius:12px;
}

/* 🔥 하단 문구 */
.footer{
  background:#000;
  color:#aaa;
  text-align:center;
  padding:15px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">

<!-- 🔥 이미지 + 폼 -->
<div class="hero">

  <img src="https://choemiseon696-lan.github.io/loan-site/main.png">

  <div class="form-overlay">

    <input class="input" placeholder="이름">
    <input class="input" placeholder="생년월일 6자리 (예: 900101)">
    <input class="input" placeholder="전화번호">

    <select class="select">
      <option>필요금액 선택</option>
      <option>500만원 이하</option>
      <option>500~1000만원</option>
      <option>1000~3000만원</option>
      <option>3000만원 이상</option>
    </select>

    <button class="submit">상담 신청하기</button>

  </div>

</div>

<!-- 🔥 실시간 신청현황 -->
<div class="live">
  <div class="live-title">실시간 신청 현황</div>
  <div id="list"></div>
</div>

<!-- 🔥 카카오 버튼 -->
<div class="kakao">
  카카오톡 상담하기
</div>

<!-- 🔥 하단 검정 카피 -->
<div class="footer">
  ※ 본 서비스는 대출 중개 서비스이며, 과도한 대출은 신용에 영향을 줄 수 있습니다.<br>
  ※ 대출 조건은 개인 신용에 따라 달라질 수 있습니다.
</div>

</div>

<script>
const names=["김**","이**","박**","최**","정**","한**"];
const amounts=["300만원","500만원","800만원","1000만원"];
const status=[
{text:"상담중",class:"wait"},
{text:"승인완료",class:"done"},
{text:"신청완료",class:"ok"}
];

function addItem(){
const name=names[Math.floor(Math.random()*names.length)];
const amount=amounts[Math.floor(Math.random()*amounts.length)];
const stat=status[Math.floor(Math.random()*status.length)];

const div=document.createElement("div");
div.className="live-item";
div.innerHTML=`
<div>${name} 고객님</div>
<div>${amount}</div>
<div class="badge ${stat.class}">${stat.text}</div>
`;

const list=document.getElementById("list");
list.prepend(div);

if(list.children.length>5){
list.removeChild(list.lastChild);
}
}

for(let i=0;i<3;i++) addItem();
setInterval(addItem,2000);
</script>

</body>
</html>
