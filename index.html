<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아몬대출중계사</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#f5f5f5;}

.wrap{max-width:480px;margin:auto;}

/* 상단 이미지 */
.main-img{
  width:100%;
  display:block;
}

/* 입력폼 */
.form-box{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.form-box h3{
  margin-bottom:10px;
}

.input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.submit-btn{
  width:100%;
  padding:14px;
  background:#2d8cff;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

/* 실시간 */
.live{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.live-item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

.badge{
  padding:3px 6px;
  border-radius:6px;
  color:#fff;
  font-size:11px;
}

.wait{background:#f0ad4e;}
.done{background:#5bc0de;}
.ok{background:#5cb85c;}

/* 하단 버튼 */
.cta-box{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:480px;
  background:#fff;
  padding:10px;
}

.btn{
  display:block;
  text-align:center;
  padding:14px;
  border-radius:10px;
  font-weight:bold;
  text-decoration:none;
  margin-bottom:8px;
}

.kakao{background:#ffcc00;color:#000;}
</style>
</head>

<body>

<div class="wrap">

<!-- 🔥 상단 이미지 -->
<img src="https://choemiseon696-lan.github.io/loan-site/main.png" class="main-img">

<!-- 🔥 입력폼 -->
<div class="form-box">
  <h3>빠른 상담 신청</h3>

  <input class="input" placeholder="이름">
  <input class="input" placeholder="생년월일 (예: 900101)">
  <input class="input" placeholder="전화번호">

  <select class="input">
    <option>필요금액 선택</option>
    <option>500만원 이하</option>
    <option>500 ~ 1000만원</option>
    <option>1000 ~ 3000만원</option>
    <option>3000만원 이상</option>
  </select>

  <button class="submit-btn">상담 신청하기</button>
</div>

<!-- 🔥 실시간 -->
<div class="live">
  <div style="font-weight:bold; margin-bottom:10px;">최근 신청 현황</div>
  <div id="list"></div>
</div>

</div>

<!-- 🔥 하단 버튼 -->
<div class="cta-box">
  <a href="https://open.kakao.com/o/너링크" class="btn kakao">카카오톡 상담하기</a>
</div>

<script>
const names=["김**","이**","박**","최**","정**"];
const amounts=["500만원","1000만원","1200만원","100만원"];
const status=[
{text:"상담중",class:"wait"},
{text:"신청완료",class:"done"},
{text:"승인완료",class:"ok"}
];

function addItem(){
const name=names[Math.floor(Math.random()*names.length)];
const amount=amounts[Math.floor(Math.random()*amounts.length)];
const stat=status[Math.floor(Math.random()*status.length)];

const div=document.createElement("div");
div.className="live-item";
div.innerHTML=`
<div>${name} / ${amount}</div>
<div class="badge ${stat.class}">${stat.text}</div>
`;

const list=document.getElementById("list");
list.prepend(div);

if(list.children.length>6){
list.removeChild(list.lastChild);
}
}

for(let i=0;i<3;i++) addItem();
setInterval(addItem,3000);
</script>

</body>
</html>
