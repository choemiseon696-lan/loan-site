<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간편 대출 상담</title>

<style>
body {margin:0; font-family:sans-serif; background:#f5f5f5;}
.section {padding:20px; max-width:600px; margin:auto;}
.hero {background:#222; color:#fff; text-align:center; padding:40px 20px;}
.box {background:#fff; padding:15px; border-radius:12px; margin-bottom:15px;}
.btn {
  display:block; text-align:center; padding:15px;
  border-radius:10px; font-weight:bold; margin-top:10px;
  text-decoration:none;
}
.kakao {background:#ffcc00; color:#000;}
.apply {background:#2d8cff; color:#fff;}

.live-item {
  display:flex; justify-content:space-between;
  padding:10px; background:#fafafa; border-radius:8px; margin-bottom:8px;
}
.badge {padding:5px 10px; border-radius:6px; color:#fff; font-size:12px;}
.wait {background:#f0ad4e;}
.done {background:#5bc0de;}
.ok {background:#5cb85c;}
</style>
</head>

<body>

<!-- 🔥 상단 -->
<div class="hero">
  <h2>무직자 / 저신용자 상담 가능</h2>
  <p>조건에 따라 빠른 안내 도와드립니다</p>

  <a href="https://open.kakao.com/o/너링크" class="btn kakao">무료 상담하기</a>
</div>

<!-- 🔥 혜택 -->
<div class="section">
  <div class="box">✔ 선입금 없음 / 간편 진행</div>
  <div class="box">✔ 상담 후 조건 안내</div>
  <div class="box">✔ 빠른 처리 지원</div>
</div>

<!-- 🔥 실시간 신청현황 -->
<div class="section box">
  <b>최근 신청 현황</b>
  <div id="list"></div>
</div>

<!-- 🔥 중간 버튼 -->
<div class="section">
  <a href="https://open.kakao.com/o/너링크" class="btn kakao">지금 상담하기</a>
  <a href="https://creatorlink.net/너링크" class="btn apply">빠른 신청</a>
</div>

<!-- 🔥 후기 느낌 -->
<div class="section">
  <div class="box">“빠르게 상담받고 해결됐어요”</div>
  <div class="box">“친절하게 안내받았습니다”</div>
</div>

<!-- 🔥 하단 CTA -->
<div class="section">
  <a href="https://open.kakao.com/o/너링크" class="btn kakao">무료 상담 받기</a>
</div>

<script>
const names = ["김**","이**","박**","최**","정**"];
const amounts = ["100만원","150만원","200만원","300만원"];
const status = [
  {text:"상담대기", class:"wait"},
  {text:"신청완료", class:"done"},
  {text:"승인완료", class:"ok"}
];

function addItem() {
  const name = names[Math.floor(Math.random()*names.length)];
  const amount = amounts[Math.floor(Math.random()*amounts.length)];
  const stat = status[Math.floor(Math.random()*status.length)];

  const div = document.createElement("div");
  div.className = "live-item";
  div.innerHTML = `
    <div>${name} / ${amount}</div>
    <div class="badge ${stat.class}">${stat.text}</div>
  `;

  const list = document.getElementById("list");
  list.prepend(div);

  if(list.children.length > 6){
    list.removeChild(list.lastChild);
  }
}

for(let i=0;i<3;i++) addItem();
setInterval(addItem, 3000);
</script>

</body>
</html>
