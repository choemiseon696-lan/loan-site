<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아몬대출중계사</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Apple SD Gothic Neo',sans-serif;
  background:#f3f6fb;
}

.wrap{
  max-width:480px;
  margin:auto;
}

/* ✅ 상단 이미지 */
.top-banner{
  width:100%;
  display:block;
  margin-bottom:-40px; /* 🔥 자연스럽게 이어지게 */
}

/* 신청폼 */
.form-box{
  background:#fff;
  margin:0 15px 15px; /* 🔥 자연스럽게 */
  padding:20px;
  border-radius:20px; /* 🔥 더 부드럽게 */
  box-shadow:0 10px 25px rgba(0,0,0,0.08); /* 🔥 고급 느낌 */
}

.input{
  width:100%;
  padding:13px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:10px;
}

.submit-btn{
  width:100%;
  padding:15px;
  background:linear-gradient(135deg,#2d8cff,#1b5ed7);
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

/* 🔥 실시간 */
.live{
  background:#fff;
  margin:20px 15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.live-title{
  font-weight:bold;
  margin-bottom:10px;
}

.live-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid #eee;
  font-size:13px;
}

.live-item:last-child{
  border-bottom:none;
}

.live-left{
  display:flex;
  gap:8px;
}

.live-name{
  font-weight:bold;
}

.live-amount{
  color:#333;
}

.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
  font-weight:bold;
  margin-right:6px;
}

.wait{background:#e3f2fd;color:#1976d2;}
.done{background:#e8f5e9;color:#2e7d32;}
.ok{background:#fff3e0;color:#ef6c00;}

.time{
  font-size:11px;
  color:#999;
}
</style>
</head>

<body>

<div class="wrap">

<!-- 🔥 상단 이미지 -->
<img src="https://choemiseon696-lan.github.io/loan-site/top-banner.png" class="top-banner">

<!-- 신청폼 -->
<div class="form-box">
  <h3>간편 상담 신청</h3>

  <input class="input" placeholder="이름">
  <input class="input" placeholder="생년월일 (예: 900101)">
  <input class="input" placeholder="전화번호">

  <select class="input">
    <option>필요금액 선택</option>
    <option>500만원 이하</option>
    <option>500 ~ 1000만원</option>
    <option>1000 ~ 3000만원</option>
    <option>3000만원 이상</option>
  </select>

  <button class="submit-btn">상담 신청하기</button>
</div>

<!-- 🔥 실시간 -->
<div class="live">
  <div class="live-title">실시간 신청 현황</div>
  <div id="list"></div>
</div>

</div>

<script>
const names=[
"김**","이**","박**","최**","정**",
"강**","조**","윤**","장**","임**",
"한**","오**","서**","신**","권**",
"황**","안**","송**","류**","전**",
"홍**","고**","문**","양**","손**",
"배**","백**","허**","유**","남**",
"심**","노**","하**","곽**","성**",
"차**","주**","우**","구**","민**",
"진**","엄**","채**","원**","천**",
"방**","공**","현**","함**","변**"
];

const amounts=[
"100만원","200만원","300만원","400만원","500만원",
"600만원","700만원","800만원","900만원","1000만원",
"1200만원","1500만원","1800만원","2000만원","2500만원",
"3000만원","4000만원","5000만원"
];

const status=[
{text:"상담중",class:"wait"},
{text:"신청완료",class:"ok"},
{text:"상담완료",class:"done"}
];

function addItem(){
  const name=names[Math.floor(Math.random()*names.length)];
  const amount=amounts[Math.floor(Math.random()*amounts.length)];
  const stat=status[Math.floor(Math.random()*status.length)];

  const div=document.createElement("div");
  div.className="live-item";
  div.innerHTML=`
    <div class="live-left">
      <div class="live-name">${name} 고객님</div>
      <div class="live-amount">${amount}</div>
    </div>
    <div>
      <span class="badge ${stat.class}">${stat.text}</span>
    </div>
  `;

  const list=document.getElementById("list");
  list.prepend(div);

  if(list.children.length>5){
    list.removeChild(list.lastChild);
  }
}

for(let i=0;i<3;i++) addItem();
setInterval(addItem,3000);
</script>
</body>
</html>
